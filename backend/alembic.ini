# Alembic configuration for AgentForge
# Doc: https://alembic.sqlalchemy.org/en/latest/tutorial.html

[alembic]
# Path to migration scripts (relative to this file)
script_location = migrations

# Jinja2 template directory (optional)
# file_template = %%(rev)s_%%(slug)s

# sys.path adjustment for env.py
# prepend_sys_path = .

# Timezone for revision file creation timestamps
# timezone =

# Max length for revision slug
# truncate_slug_length = 40

# Revision ordering. Linear = "head" only, non-linear = "heads"
revision_environment = false

# SQLAlchemy URL — overridden at runtime by env.py reading from Settings,
# but alembic needs a valid placeholder here for offline mode.
sqlalchemy.url = postgresql://postgres:%%3FBooker78%%21@localhost:5432/agentvault

# Output encoding for migration scripts
# output_encoding = utf-8

[post_write_hooks]
# post_write_hooks defines scripts or Python functions that are run
# on newly generated revision scripts.
# See the documentation for further detail and examples
# https://alembic.sqlalchemy.org/en/latest/autogenerate.html#running-post-write-hooks

[loggers]
keys = root,sqlalchemy,alembic

[handlers]
keys = console

[formatters]
keys = generic

[logger_root]
level = WARN
handlers = console
qualname =

[logger_sqlalchemy]
level = WARN
handlers =
qualname = sqlalchemy.engine

[logger_alembic]
level = INFO
handlers =
qualname = alembic

[handler_console]
class = StreamHandler
args = (sys.stderr,)
level = NOTSET
formatter = generic

[formatter_generic]
format = %(levelname)-5.5s [%(name)s] %(message)s
datefmt = %H:%M:%S
